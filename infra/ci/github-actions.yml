# ============================================================
# Saha Flow - CI/CD Pipeline (GitHub Actions)
# ============================================================
# Triggers: push to main, pull requests to main
# Jobs: lint, test (backend/web/mobile), security scan,
#        docker build, integration test
# ============================================================

name: SahaFlow CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".gitignore"
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "docs/**"
      - "*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "21"
  FLUTTER_VERSION: "3.22.x"
  DOCKER_BUILDKIT: "1"

jobs:
  # ==========================================================
  # LINT - Code style and static analysis
  # ==========================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Backend: Spotless check (Java/Kotlin code formatting)
      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Gradle Spotless Check
        run: ./gradlew spotlessCheck --no-daemon --parallel
        continue-on-error: true

      # Web: ESLint
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install & Lint Web
        working-directory: web
        run: |
          npm ci --ignore-scripts
          npm run lint

      # Mobile: Dart analyze
      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Dart Analyze
        working-directory: mobile
        run: flutter analyze
        continue-on-error: true

  # ==========================================================
  # TEST BACKEND - Unit + Integration Tests
  # ==========================================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sahaflow_test
          POSTGRES_USER: sahaflow
          POSTGRES_PASSWORD: test_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Backend Tests
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: sahaflow_test
          DB_USER: sahaflow
          DB_PASSWORD: test_only
        run: ./gradlew :services:api:test --no-daemon --stacktrace

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: services/api/build/reports/tests/
          retention-days: 7

  # ==========================================================
  # TEST WEB - Lint, TypeCheck, Unit Tests, Build
  # ==========================================================
  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: TypeCheck
        working-directory: web
        run: npm run typecheck

      - name: Unit Tests
        working-directory: web
        run: npm test -- --coverage

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: web/coverage/
          retention-days: 7

  # ==========================================================
  # TEST MOBILE - Flutter Tests
  # ==========================================================
  test-mobile:
    name: Test Mobile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Run Unit & Widget Tests
        working-directory: mobile
        run: flutter test --coverage

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/
          retention-days: 7

  # ==========================================================
  # SECURITY SCAN - SAST, Dependency, Secrets
  # ==========================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gitleaks - Secret detection
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        continue-on-error: true

      # Trivy - Filesystem vulnerability scan
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
        continue-on-error: true

      # npm audit for web
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm Audit
        working-directory: web
        run: npm audit --audit-level=high
        continue-on-error: true

      # OWASP Dependency Check for Gradle
      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: OWASP Dependency Check
        run: ./gradlew dependencyCheckAnalyze --no-daemon
        continue-on-error: true

  # ==========================================================
  # BUILD DOCKER - Container images + scan
  # ==========================================================
  build-docker:
    name: Build & Scan Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-web]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build backend image (no push)
      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/Dockerfile.backend
          push: false
          load: true
          tags: sahaflow-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build web image (no push)
      - name: Build Web Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/Dockerfile.web
          push: false
          load: true
          tags: sahaflow-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy container scan
      - name: Trivy Backend Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sahaflow-backend:ci
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Trivy Web Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sahaflow-web:ci
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
        continue-on-error: true

      # SBOM generation via Syft
      - name: Generate Backend SBOM
        uses: anchore/sbom-action@v0
        with:
          image: sahaflow-backend:ci
          format: spdx-json
          output-file: backend-sbom.spdx.json
        continue-on-error: true

      - name: Generate Web SBOM
        uses: anchore/sbom-action@v0
        with:
          image: sahaflow-web:ci
          format: spdx-json
          output-file: web-sbom.spdx.json
        continue-on-error: true

      - name: Upload SBOMs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: "*.spdx.json"
          retention-days: 30

  # ==========================================================
  # INTEGRATION TEST - Smoke test the full stack
  # ==========================================================
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        working-directory: infra
        env:
          DB_PASSWORD: development_only
          JWT_SECRET: ci-test-secret-do-not-use-in-prod
        run: docker compose up -d postgres backend web

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy!"
              break
            fi
            echo "Waiting for backend... attempt $i/30 (got $STATUS)"
            sleep 5
          done

      - name: Wait for web health
        run: |
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Web is healthy!"
              break
            fi
            echo "Waiting for web... attempt $i/15 (got $STATUS)"
            sleep 3
          done

      - name: API Health Check
        run: |
          echo "=== Backend Health ==="
          curl -v http://localhost:8080/actuator/health || true
          echo ""
          echo "=== Web Homepage ==="
          curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:3000 || true
          echo ""

      - name: Stop services
        if: always()
        working-directory: infra
        run: docker compose down -v
