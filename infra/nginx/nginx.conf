# ============================================================
# Saha Flow - Nginx Reverse Proxy Configuration
# ============================================================
# Routes: /        -> web (Next.js on port 3000)
#         /api/    -> backend (Spring Boot on port 8080)
# Security headers, gzip, and rate limiting included.
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';

  access_log /var/log/nginx/access.log main;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 20M;
  server_tokens off;

  # --- Gzip ---
  gzip on;
  gzip_vary on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/woff2
    application/vnd.api+json;

  # --- Rate Limiting ---
  # 10 requests per second, burst 20
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=web_limit:10m rate=20r/s;
  limit_req_status 429;

  # --- Upstreams ---
  upstream web_upstream {
    server web:3000;
    keepalive 32;
  }

  upstream backend_upstream {
    server backend:8080;
    keepalive 32;
  }

  server {
    listen 80;
    server_name localhost;

    # --- Security Headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    # Uncomment for production HTTPS:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # --- Health Check Endpoint ---
    location /health {
      access_log off;
      return 200 "OK\n";
      add_header Content-Type text/plain;
    }

    # --- Web Frontend ---
    location / {
      limit_req zone=web_limit burst=20 nodelay;
      proxy_pass http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # --- Backend API ---
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://backend_upstream/api/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;

      # Do not cache API responses
      proxy_no_cache 1;
      proxy_cache_bypass 1;
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # --- Actuator (internal only, comment out in production) ---
    location /actuator/ {
      limit_req zone=api_limit burst=5 nodelay;
      allow 127.0.0.1;
      allow 172.16.0.0/12; # Docker internal network
      allow 10.0.0.0/8;    # Docker internal network
      deny all;
      proxy_pass http://backend_upstream/actuator/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Deny access to hidden files ---
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }
  }
}
