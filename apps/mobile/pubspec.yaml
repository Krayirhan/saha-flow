name: saha_flow_mobile
description: Saha Flow - Field Service Management Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Code generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Security
  flutter_secure_storage: ^9.2.2

  # Location
  geolocator: ^12.0.0

  # Media
  image_picker: ^1.1.2

  # Storage
  path_provider: ^2.1.3
  sembast: ^3.7.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  mockito: ^5.4.4
  build_test: ^2.2.2

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
